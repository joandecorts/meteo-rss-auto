<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>METAR OBS</title>

  <style>
    body {
      margin: 0;
      padding: 12px;
      background-color: #004080;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: white;
    }

    h1 {
      margin: 0 0 12px 0;
      text-align: center;
      font-family: system-ui, Arial, sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .card {
      background-color: #002a55;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .title {
      font-family: system-ui, Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
    }

    iframe {
      width: 100%;
      height: 72px;
      border: none;
      background-color: #ffffff;
    }
  </style>
</head>

<body>

  <h1>METAR Catalunya</h1>

  <div class="card">
    <div class="title">Girona – Costa Brava (LEGE)</div>
    https://tgftp.nws.noaa.gov/data/observations/metar/stations/LEGE.TXT
    </iframe>
  </div>

  <div class="card">
    <div class="title">Barcelona – El Prat (LEBL)</div>
    https://tgftp.nws.noaa.gov/data/observations/metar/stations/LEBL.TXT
    </iframe>
  </div>

</body>
</html>
