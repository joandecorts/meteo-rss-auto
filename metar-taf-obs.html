<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>METAR / TAF · OBS</title>

<style>
  body {
    margin: 0;
    padding: 32px;
    height: 100vh;
    box-sizing: border-box;
    color: #ffffff;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

    background:
      radial-gradient(900px 500px at 15% 20%, #2fb8ff55 0%, transparent 60%),
      radial-gradient(800px 500px at 85% 30%, #38e1c055 0%, transparent 60%),
      linear-gradient(160deg, #0b5ed7, #0a3a66);
  }

  h1 {
    margin: 0 0 18px 0;
    font-size: 36px;
    font-weight: 900;
  }

  .slides {
    position: relative;
    height: calc(100% - 140px);
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .slide.active {
    opacity: 1;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    height: 100%;
  }

  .panel {
    background: rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 24px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .airport {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .name {
    font-size: 22px;
    font-weight: 800;
  }

  .icao {
    font-family: monospace;
    opacity: .8;
  }

  .badge {
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 900;
    font-size: 14px;
    color: #003d26;
    background: #2ee59d;
  }

  .kpis {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .kpi {
    background: rgba(0,0,0,.25);
    border-radius: 14px;
    padding: 10px;
  }

  .kpi .label {
    font-size: 12px;
    opacity: .8;
    font-weight: 700;
  }

  .kpi .value {
    margin-top: 6px;
    font-size: 20px;
    font-weight: 900;
    font-family: monospace;
  }

  .raw {
    background: rgba(0,0,0,.25);
    border-radius: 14px;
    padding: 12px;
  }

  .raw h3 {
    margin: 0 0 6px 0;
    font-size: 13px;
    opacity: .8;
  }

  pre {
    margin: 0;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.25;
    white-space: pre-wrap;
  }

  .public p {
    font-size: 20px;
    line-height: 1.4;
    margin: 0;
  }

  footer {
    margin-top: 18px;
    font-size: 12px;
    opacity: .85;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    font-family: monospace;
  }
</style>
</head>

<body>

<h1>METAR / TAF · Catalunya</h1>

<div class="slides">

  <!-- SLIDE 1 · RAW -->
  <div class="slide active" id="slide-raw">
    <div class="grid" id="grid-raw"></div>
  </div>

  <!-- SLIDE 2 · PÚBLIC GENERAL -->
  <div class="slide" id="slide-public">
    <div class="grid" id="grid-public"></div>
  </div>

</div>

<footer>
  <div>
    Font de dades: NOAA / NWS · tgftp.nws.noaa.gov
  </div>
  <div>
    Projecte personal de caràcter experimental · No fer servir per a ús operatiu
  </div>
</footer>

<script>
let slides = [
  document.getElementById("slide-raw"),
  document.getElementById("slide-public")
];
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 9000); // 9 segons per slide

fetch("data/aviation.json", { cache: "no-store" })
  .then(r => r.json())
  .then(data => {

    data.airports.forEach(a => {
      const f = a.metar.fields || {};
      const wind = f.wind ? `${f.wind.dir}° ${f.wind.speed_kt} kt` : "—";

      /* SLIDE RAW */
      document.getElementById("grid-raw").insertAdjacentHTML("beforeend", `
        <div class="panel">
          <div class="airport">
            <div>
              <div class="name">${a.name}</div>
              <div class="icao">${a.icao}</div>
            </div>
            <div class="badge">${f.category || "—"}</div>
          </div>

          <div class="kpis">
            <div class="kpi"><div class="label">Vent</div><div class="value">${wind}</div></div>
            <div class="kpi"><div class="label">Visibilitat</div><div class="value">${f.visibility_m >= 10000 ? "10 km+" : (f.visibility_m || "—")}</div></div>
            <div class="kpi"><div class="label">Ceiling</div><div class="value">${f.ceiling_ft ? f.ceiling_ft+" ft" : "—"}</div></div>
            <div class="kpi"><div class="label">QNH</div><div class="value">${f.qnh_hpa ? "Q"+f.qnh_hpa : "—"}</div></div>
          </div>

          <div class="raw">
            <h3>RAW METAR</h3>
            <pre>${a.metar.raw || "—"}</pre>
          </div>

          <div class="raw">
            <h3>RAW TAF</h3>
            <pre>${a.taf.raw || "—"}</pre>
          </div>
        </div>
      `);

      /* SLIDE PÚBLIC */
      document.getElementById("grid-public").insertAdjacentHTML("beforeend", `
        <div class="panel public">
          <div class="name">${a.name}</div>
          <p>☀️ Estat general: <b>${f.category || "—"}</b></p>
          <p>🌬️ Vent: <b>${wind}</b></p>
          <p>👁️ Visibilitat: <b>${f.visibility_m >= 10000 ? "molt bona" : (f.visibility_m+" m")}</b></p>
          <p>🌡️ Temperatura: <b>${f.temp_c ?? "—"} °C</b></p>
          <p>⬇️ Pressió: <b>${f.qnh_hpa ?? "—"} hPa</b></p>
          <p>✈️ Condicions adequades per a l’aviació general</p>
        </div>
      `);
    });

  });
</script>

</body>
</html>
``
