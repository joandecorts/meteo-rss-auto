<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>METAR / TAF · TEST BASE</title>

<style>
body{
  margin:0;
  padding:24px;
  background:#0a3a66;
  color:#fff;
  font-family:system-ui, Arial;
}

h1{margin-top:0}

.section{
  margin-bottom:28px;
  padding:16px;
  background:rgba(255,255,255,.12);
  border-radius:12px;
}

pre{
  font-family:monospace;
  white-space:pre-wrap;
  margin:0;
}

#output{
  position:fixed;
  top:16px;
  right:16px;
  font-family:monospace;
  font-size:14px;
  padding:8px 12px;
  background:rgba(0,0,0,.4);
  border-radius:999px;
}
</style>
</head>

<body>

<h1>METAR / TAF · Catalunya (TEST BASE)</h1>

<!-- Rellotge TAL QUAL -->
<div id="output"></div>

<div id="content"></div>

<!-- Moment.js (TAL QUAL) -->
https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.jsscript>
<script>
  var output = document.getElementById("output");
  function updateClock(){
    output.innerText = moment().format('LL LTS [GMT]ZZ');
  }
  setInterval(updateClock,1000);
  updateClock();
</script>

<!-- JS MINIMAL ES5 -->
<script>
(function(){

  var container = document.getElementById("content");

  function load(){
    var xhr = new XMLHttpRequest();
    xhr.open("GET","data/aviation.json",true);
    xhr.onreadystatechange = function(){
      if(xhr.readyState === 4){
        if(xhr.status !== 200){
          container.innerHTML =
            "<div class='section'>❌ No s'ha pogut carregar aviation.json</div>";
          return;
        }

        var data;
        try{
          data = JSON.parse(xhr.responseText);
        }catch(e){
          container.innerHTML =
            "<div class='section'>❌ JSON invàlid</div>";
          return;
        }

        render(data);
      }
    };
    xhr.send(null);
  }

  function esc(t){
    return String(t||"")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
  }

  function render(data){
    container.innerHTML = "";

    if(!data.airports || !data.airports.length){
      container.innerHTML =
        "<div class='section'>❌ aviation.json sense aeroports</div>";
      return;
    }

    for(var i=0;i<data.airports.length;i++){
      var a = data.airports[i];

      container.innerHTML +=
        "<div class='section'>" +
          "<h3>"+esc(a.name)+" ("+esc(a.icao)+")</h3>" +
          "<strong>METAR</strong><pre>"+esc(a.metar.raw)+"</pre>" +
          "<strong>TAF</strong><pre>"+esc(a.taf.raw)+"</pre>" +
        "</div>";
    }
  }

  load();
})();
</script>

</body>
</html>
