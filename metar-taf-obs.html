<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>METAR / TAF · ROTACIÓ BASE</title>

<style>
body{
  margin:0;
  padding:24px;
  background:#0a3a66;
  color:#fff;
  font-family:system-ui, Arial;
}

h1{margin-top:0}

.page{
  display:none;
}

.page.active{
  display:block;
}

.section{
  margin-bottom:28px;
  padding:16px;
  background:rgba(255,255,255,.12);
  border-radius:12px;
}

pre{
  font-family:monospace;
  white-space:pre-wrap;
  margin:0;
}

#output{
  position:fixed;
  top:16px;
  right:16px;
  font-family:monospace;
  font-size:14px;
  padding:8px 12px;
  background:rgba(0,0,0,.4);
  border-radius:999px;
  white-space:nowrap;
}
</style>
</head>

<body>

<h1>METAR / TAF · Catalunya</h1>

<!-- Rellotge tal qual -->
<div id="output"></div>

<div id="pages">
  <div class="page active" id="page-0"></div>
  <div class="page" id="page-1"></div>
  <div class="page" id="page-2"></div>
</div>

<!-- Moment.js TAL QUAL -->
https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.jsscript>
<script>
  var output = document.getElementById("output");
  function updateClock(){
    output.innerText = moment().format('LL LTS [GMT]ZZ');
  }
  setInterval(updateClock,1000);
  updateClock();
</script>

<!-- JS ES5 + ROTACIÓ -->
<script>
(function(){

  var pages = [
    document.getElementById("page-0"),
    document.getElementById("page-1"),
    document.getElementById("page-2")
  ];

  var current = 0;

  function showPage(n){
    for(var i=0;i<pages.length;i++){
      pages[i].className = "page";
    }
    pages[n].className = "page active";
  }

  function rotate(){
    current = (current + 1) % pages.length;
    showPage(current);
    setTimeout(rotate, 8000);
  }

  function esc(t){
    return String(t||"")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
  }

  function render(data){
    var p0 = pages[0];
    var p1 = pages[1];
    var p2 = pages[2];

    p0.innerHTML = "<h2>Dades en brut (METAR/TAF)</h2>";
    p1.innerHTML = "<h2>Dades actuals (lectura fàcil)</h2>";
    p2.innerHTML = "<h2>Previsió TAF</h2>";

    for(var i=0;i<data.airports.length;i++){
      var a = data.airports[i];

      p0.innerHTML +=
        "<div class='section'><strong>"+esc(a.name)+"</strong>"+
        "<pre>"+esc(a.metar.raw)+"</pre>"+
        "<pre>"+esc(a.taf.raw)+"</pre></div>";

      p1.innerHTML +=
        "<div class='section'><strong>"+esc(a.name)+"</strong>"+
        "<div>Vent: "+esc(a.metar.fields.wind ? a.metar.fields.wind.speed_kt+" kt" : "—")+"</div>"+
        "<div>Visibilitat: "+esc(a.metar.fields.visibility_m)+" m</div></div>";

      p2.innerHTML +=
        "<div class='section'><strong>"+esc(a.name)+"</strong>"+
        "<pre>"+esc(a.taf.raw)+"</pre></div>";
    }

    // arrenca rotació quan ja tenim dades
    setTimeout(rotate, 8000);
  }

  function load(){
    var xhr = new XMLHttpRequest();
    xhr.open("GET","data/aviation.json",true);
    xhr.onreadystatechange = function(){
      if(xhr.readyState === 4 && xhr.status === 200){
        var data = JSON.parse(xhr.responseText);
        render(data);
      }
    };
    xhr.send(null);
  }

  load();

})();
</script>

</body>
</html>
