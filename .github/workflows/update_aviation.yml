name: Update METAR/TAF (NOAA) -> gh-pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure folders
        run: |
          mkdir -p data
          mkdir -p scripts

      # Copiem l'script dins gh-pages (o bé el pots tenir ja a gh-pages)
      - name: Add/Update script
        run: |
          cat > scripts/fetch_aviation.py <<'PY'
          (ENGANXA AQUÍ EL PYTHON SENCER DE DALT)
          PY

      - name: Generate aviation.json
        run: |
          python scripts/fetch_aviation.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aviation.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update aviation METAR/TAF data"
            git push
          fi
