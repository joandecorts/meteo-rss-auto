name: Update METAR / TAF (NOAA)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch script
        run: |
          mkdir -p data
          python scripts/fetch_aviation.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aviation.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update aviation METAR/TAF data"
            git push
          fi
