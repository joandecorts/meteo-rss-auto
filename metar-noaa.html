<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Test fetch</title>
</head>
<body>

<h2 id="res">Provant…</h2>

<script>
fetch("https://httpbin.org/get")
  .then(r => r.json())
  .then(d => {
      document.getElementById("res").textContent =
        "FETCH FUNCIONA ✅";
  })
  .catch(e => {
      document.getElementById("res").textContent =
        "FETCH BLOQUEJAT ❌";
  });
</script>

</body>
</html>
