<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>METAR Catalunya</title>

<style>
    body {
        background: #004080;
        color: white;
        font-family: monospace;
        padding: 20px;
    }
    h1 {
        text-align: center;
        font-family: Arial, sans-serif;
    }
    .box {
        background: #002a55;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
    }
    .airport {
        font-weight: bold;
        margin-bottom: 6px;
        font-family: Arial, sans-serif;
    }
</style>
</head>

<body>

<h1>METAR Catalunya</h1>

<div class="box">
    <div class="airport">Girona–Costa Brava (LEGE)</div>
    <div id="lege">Carregant METAR…</div>
</div>

<div class="box">
    <div class="airport">Barcelona–El Prat (LEBL)</div>
    <div id="lebl">Carregant METAR…</div>
</div>

<script>
async function carregaMETAR(codi, elementId) {
    const metarUrl =
        `https://tgftp.nws.noaa.gov/data/observations/metar/stations/${codi}.TXT`;

    const proxy =
        `https://corsproxy.io/?${encodeURIComponent(metarUrl)}`;

    try {
        const resposta = await fetch(proxy);
        const text = await resposta.text();

        const linies = text.trim().split("\n");
        const metar = linies.slice(1).join(" ");

        document.getElementById(elementId).textContent = metar;
    } catch (e) {
        document.getElementById(elementId).textContent =
            "No s'han pogut carregar dades METAR";
    }
}

carregaMETAR("LEGE", "lege");
carregaMETAR("LEBL", "lebl");
</script>

</body>
</html>
